<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio,Video, And Iframe Example</title>
</head>
<body>
 <h1>HTML Multimedia Elements</h1>
 <h2>Audio</h2>
 <adio controls>
    <Source scr="Music..mp3"type="audio/mpeg">
    </audio>
    <h2>Video</h2>
    <Video Width="500"controls>
        <Source src="Movie.mp4"type="Video/mp4">
    </Video> 
    <h2>Iframe</h2>
<iframe width="560" height="315" src="https://www.youtube.com/embed/ldu3q3sFwL0?si=xAlOUSNFhfXoTosr" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>    
</body>
</html>
